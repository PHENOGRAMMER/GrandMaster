name: Keep Render Awake

on:
  schedule:
    # Every 14 minutes, 24/7
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging Render..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://grandmaster-tj4w.onrender.com/health)
          if [ $response -eq 200 ]; then
            echo "✅ Server is awake (HTTP $response)"
          else
            echo "⚠️ Server returned HTTP $response"
          fi